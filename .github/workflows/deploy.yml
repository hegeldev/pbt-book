name: Deploy book to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push cancel an in-progress deploy, but don't cancel a run that is
# already publishing.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.3"
  MDBOOK_TABS_VERSION: "1.0.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install mdbook-tabs
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook-tabs@${{ env.MDBOOK_TABS_VERSION }}

      - name: Build
        run: mdbook build

      - name: Add CNAME for custom domain
        run: echo "book.hegel.dev" > book/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
